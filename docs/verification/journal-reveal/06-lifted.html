<!doctype html><html><head><meta charset="utf-8"/><title>Journal reveal — lifted</title>
<style>
body{margin:0;min-height:100vh;background:#1c1610;display:grid;place-items:center}
.journal-reveal{position:relative;min-height:100vh;width:100%}
/**
 * Journal gift reveal — ceremonial completion (not a loader).
 */

.journal-reveal {
  --jg-gift-wrap-paper: url("/images/spark-wrapping-paper.png");
  position: absolute;
  inset: 0;
  z-index: 40;
  display: grid;
  place-items: center;
  pointer-events: auto;
  isolation: isolate;
}

.journal-reveal__veil {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 70% 55% at 50% 48%, rgba(255, 248, 235, 0.22), transparent 70%),
    radial-gradient(ellipse 100% 80% at 50% 100%, rgba(20, 14, 8, 0.45), transparent 55%);
  pointer-events: none;
}

.journal-reveal__stage {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1.35rem;
  width: min(92vw, 28rem);
  padding: 1rem;
}

.journal-reveal__skip {
  position: absolute;
  top: max(1rem, env(safe-area-inset-top));
  right: max(1rem, env(safe-area-inset-right));
  z-index: 5;
  border: 1px solid rgba(232, 214, 180, 0.45);
  background: rgba(28, 22, 16, 0.55);
  color: #f4ebe0;
  border-radius: 999px;
  padding: 0.55rem 1rem;
  font-size: 0.95rem;
  letter-spacing: 0.02em;
  cursor: pointer;
  backdrop-filter: blur(8px);
}

.journal-reveal__skip:hover,
.journal-reveal__skip:focus-visible {
  outline: 2px solid rgba(212, 175, 105, 0.85);
  outline-offset: 2px;
  background: rgba(40, 32, 24, 0.72);
}

.journal-reveal__message {
  margin: 0;
  text-align: center;
  color: #f7f0e4;
  font-family: Georgia, "Times New Roman", serif;
  font-size: clamp(1.15rem, 2.4vw, 1.45rem);
  font-weight: 400;
  text-shadow: 0 2px 18px rgba(0, 0, 0, 0.45);
  min-height: 1.6em;
}

.journal-reveal__hint {
  margin: 0;
  text-align: center;
  color: rgba(247, 240, 228, 0.82);
  font-size: 0.98rem;
}

.journal-reveal__gift {
  position: relative;
  width: min(72vw, 15.5rem);
  aspect-ratio: 3 / 4;
  transform-style: preserve-3d;
  cursor: pointer;
  border: none;
  background: transparent;
  padding: 0;
  color: inherit;
}

.journal-reveal__gift-motion {
  display: block;
  position: absolute;
  inset: 0;
}

.journal-reveal__gift:focus-visible {
  outline: 2px solid rgba(212, 175, 105, 0.9);
  outline-offset: 8px;
  border-radius: 0.75rem;
}

.journal-reveal__gift--idle {
  cursor: default;
}

.journal-reveal__box {
  position: absolute;
  inset: 8% 10% 10%;
  border-radius: 0.55rem;
  background:
    linear-gradient(145deg, #f4ebdc 0%, #e8d9c2 48%, #d9c6a8 100%);
  box-shadow:
    0 18px 40px rgba(20, 12, 6, 0.45),
    inset 0 1px 0 rgba(255, 255, 255, 0.35);
  overflow: hidden;
}

.journal-reveal__paper {
  position: absolute;
  inset: 0;
  background-color: #f3ebdd;
  background-image:
    var(--jg-gift-wrap-paper),
    repeating-linear-gradient(
      0deg,
      transparent,
      transparent 18px,
      rgba(196, 155, 74, 0.07) 18px,
      rgba(196, 155, 74, 0.07) 19px
    ),
    radial-gradient(circle at 20% 30%, rgba(212, 175, 105, 0.18), transparent 28%),
    radial-gradient(circle at 70% 65%, rgba(212, 175, 105, 0.14), transparent 32%);
  background-size: cover, auto, auto, auto;
  background-position: center;
  box-shadow: inset 0 0 40px rgba(120, 90, 40, 0.12);
  transition:
    transform 1s cubic-bezier(0.22, 0.8, 0.28, 1),
    opacity 0.85s ease,
    clip-path 1s cubic-bezier(0.22, 0.8, 0.28, 1);
}

.journal-reveal__paper::after {
  content: "";
  position: absolute;
  inset: 0;
  background:
    repeating-linear-gradient(
      45deg,
      transparent 0 14px,
      rgba(184, 140, 55, 0.08) 14px 15px
    );
  mix-blend-mode: soft-light;
  pointer-events: none;
}

.journal-reveal__paper-sheen {
  position: absolute;
  inset: 0;
  background: linear-gradient(
    120deg,
    transparent 30%,
    rgba(255, 248, 230, 0.28) 48%,
    transparent 66%
  );
  pointer-events: none;
}

.journal-reveal__ribbon-h,
.journal-reveal__ribbon-v {
  position: absolute;
  background: linear-gradient(
    180deg,
    #f0d48a 0%,
    #d4af5a 35%,
    #b8903a 55%,
    #e8c878 100%
  );
  box-shadow:
    inset 0 1px 0 rgba(255, 255, 255, 0.45),
    inset 0 -1px 0 rgba(90, 60, 10, 0.25),
    0 2px 8px rgba(40, 24, 4, 0.25);
}

.journal-reveal__ribbon-h {
  left: -4%;
  right: -4%;
  top: 46%;
  height: 12%;
}

.journal-reveal__ribbon-v {
  top: -4%;
  bottom: -4%;
  left: 44%;
  width: 12%;
}

.journal-reveal__bow {
  position: absolute;
  left: 50%;
  top: 42%;
  width: 42%;
  aspect-ratio: 1.35;
  transform: translate(-50%, -50%);
  filter: drop-shadow(0 4px 10px rgba(40, 24, 4, 0.35));
}

.journal-reveal__bow-loop {
  position: absolute;
  width: 46%;
  height: 58%;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, #f6e2a8, #c99a3e 70%);
  box-shadow: inset -2px -2px 6px rgba(80, 50, 10, 0.35);
}

.journal-reveal__bow-loop--l {
  left: 4%;
  top: 8%;
  transform: rotate(-28deg);
}

.journal-reveal__bow-loop--r {
  right: 4%;
  top: 8%;
  transform: rotate(28deg);
}

.journal-reveal__bow-knot {
  position: absolute;
  left: 50%;
  top: 42%;
  width: 22%;
  height: 22%;
  border-radius: 50%;
  transform: translate(-50%, -50%);
  background: radial-gradient(circle at 35% 30%, #f3d78a, #a87828);
}

.journal-reveal__bow-tail {
  position: absolute;
  top: 58%;
  width: 18%;
  height: 48%;
  border-radius: 40% 40% 20% 20%;
  background: linear-gradient(180deg, #e0bc62, #b48a30);
}

.journal-reveal__bow-tail--l {
  left: 28%;
  transform: rotate(18deg);
}

.journal-reveal__bow-tail--r {
  right: 28%;
  transform: rotate(-18deg);
}

.journal-reveal__glow {
  position: absolute;
  inset: -12%;
  border-radius: 1.25rem;
  background: radial-gradient(
    circle at 50% 45%,
    rgba(255, 220, 140, 0.45),
    transparent 62%
  );
  pointer-events: none;
  mix-blend-mode: screen;
}

.journal-reveal__journal {
  position: absolute;
  inset: 10% 14% 12%;
  border-radius: 0.4rem;
  overflow: hidden;
  box-shadow:
    0 16px 36px rgba(16, 10, 4, 0.5),
    inset 0 1px 0 rgba(255, 255, 255, 0.2);
  transform-origin: left center;
}

.journal-reveal__journal-cover {
  position: absolute;
  inset: 0;
  background: #3b2416;
  background-size: cover;
  background-position: center;
}

.journal-reveal__journal-cover[data-leather="cognac"] {
  background-color: #8b5a2b;
}
.journal-reveal__journal-cover[data-leather="espresso"] {
  background-color: #3b2416;
}
.journal-reveal__journal-cover[data-leather="forest"] {
  background-color: #2f4a35;
}
.journal-reveal__journal-cover[data-leather="midnight"] {
  background-color: #1d2a3a;
}
.journal-reveal__journal-cover[data-leather="burgundy"] {
  background-color: #5c2433;
}
.journal-reveal__journal-cover[data-leather="camel"] {
  background-color: #b08958;
}

.journal-reveal__journal-title {
  position: absolute;
  left: 10%;
  right: 10%;
  top: 48%;
  text-align: center;
  color: #f0d48a;
  font-family: Georgia, "Times New Roman", serif;
  font-size: clamp(0.95rem, 2.4vw, 1.2rem);
  letter-spacing: 0.04em;
  text-shadow: 0 1px 2px rgba(0, 0, 0, 0.45);
  z-index: 2;
}

.journal-reveal__journal-cover--compact .journal-reveal__journal-title {
  top: 52%;
  font-size: clamp(0.62rem, 1.6vw, 0.78rem);
}

.journal-reveal__journal-flame {
  position: absolute;
  top: 14%;
  left: 50%;
  transform: translateX(-50%);
  width: 22%;
  display: grid;
  place-items: center;
  opacity: 0.92;
  z-index: 2;
  pointer-events: none;
}

.journal-reveal__journal-cover--compact .journal-reveal__journal-flame {
  top: 12%;
  width: 28%;
}

.journal-reveal__journal-flame .jg-spark-flame-img {
  width: 100%;
  height: auto;
  filter: drop-shadow(0 2px 6px rgba(0, 0, 0, 0.35));
}

.journal-reveal__journal--wrapping {
  inset: 12% 16% 14%;
  z-index: 0;
}

.journal-reveal__paper-flame {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle at 50% 42%, rgba(255, 220, 140, 0.22), transparent 38%),
    url("/images/ssc-presence-flame.png");
  background-repeat: no-repeat, no-repeat;
  background-position: center 38%, center 40%;
  background-size: auto, 18%;
  opacity: 0.28;
  mix-blend-mode: soft-light;
  pointer-events: none;
}

/* Subtle leather identity on wrapping paper / box */
.journal-reveal__paper[data-leather="forest"],
.journal-reveal__box[data-leather="forest"] .journal-reveal__paper {
  background-color: #e8efe6;
}
.journal-reveal__paper[data-leather="cognac"],
.journal-reveal__box[data-leather="cognac"] .journal-reveal__paper {
  background-color: #f3ebdd;
}
.journal-reveal__paper[data-leather="midnight"],
.journal-reveal__box[data-leather="midnight"] .journal-reveal__paper {
  background-color: #e6ebf2;
}
.journal-reveal__paper[data-leather="burgundy"],
.journal-reveal__box[data-leather="burgundy"] .journal-reveal__paper {
  background-color: #f2e6e9;
}
.journal-reveal__paper[data-leather="espresso"],
.journal-reveal__box[data-leather="espresso"] .journal-reveal__paper {
  background-color: #ece6e0;
}
.journal-reveal__paper[data-leather="camel"],
.journal-reveal__box[data-leather="camel"] .journal-reveal__paper {
  background-color: #f5efdf;
}

.journal-reveal__gift--ribbon-pulling .journal-reveal__ribbon-h,
.journal-reveal__gift--ribbon-pulling .journal-reveal__ribbon-v {
  filter: brightness(1.08);
}

.journal-reveal__unwrap-prompt:disabled,
.journal-reveal__gift:disabled {
  cursor: wait;
  opacity: 0.92;
}

/* No estate glow / sample ghosts under the ceremonial gift */
.journal-estate--gift .journal-estate__glow,
.journal-gazebo--gift-unwrap .journal-estate__glow,
.journal-gazebo--gift-unwrap .jg-open-book__focus-veil--gift {
  display: none !important;
}

.journal-reveal__particles {
  position: absolute;
  inset: 0;
  pointer-events: none;
  overflow: hidden;
}

.journal-reveal__particle {
  position: absolute;
  width: 0.35rem;
  height: 0.35rem;
  border-radius: 50%;
  background: radial-gradient(circle, #ffe6a8, #d4a24a 60%, transparent);
  opacity: 0.85;
}

.journal-reveal__cta {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.35rem;
}

.journal-reveal__cta strong {
  font-family: Georgia, "Times New Roman", serif;
  font-size: 1.35rem;
  font-weight: 500;
  color: #fff8ec;
}

.journal-reveal__cta span {
  color: rgba(247, 240, 228, 0.85);
  font-size: 1rem;
}

.journal-reveal__unwrap-prompt {
  border: 1px solid rgba(232, 214, 180, 0.4);
  background: rgba(28, 22, 16, 0.5);
  color: #f7f0e4;
  border-radius: 999px;
  padding: 0.65rem 1.25rem;
  font-size: 1rem;
  cursor: pointer;
}

.journal-reveal__unwrap-prompt:focus-visible {
  outline: 2px solid rgba(212, 175, 105, 0.9);
  outline-offset: 2px;
}

.journal-reveal .sr-only {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  margin: -1px;
  overflow: hidden;
  clip: rect(0, 0, 0, 0);
  white-space: nowrap;
  border: 0;
}

@media (prefers-reduced-motion: reduce) {
  .journal-reveal__glow,
  .journal-reveal__paper-sheen,
  .journal-reveal__particles {
    display: none;
  }

  .journal-reveal__chevron-nudge,
  .journal-reveal__gift--nudge {
    animation: none;
  }
}

/* ——— Panel storyboard ——— */

.journal-reveal__wordmark {
  position: absolute;
  top: max(1.1rem, env(safe-area-inset-top));
  left: 50%;
  transform: translateX(-50%);
  z-index: 5;
  display: flex;
  align-items: center;
  gap: 0.45rem;
  color: #e8d6a8;
  font-family: Georgia, "Times New Roman", serif;
  font-size: clamp(0.72rem, 1.6vw, 0.88rem);
  letter-spacing: 0.22em;
  text-transform: uppercase;
  text-shadow: 0 2px 12px rgba(0, 0, 0, 0.45);
  pointer-events: none;
}

.journal-reveal__wordmark-flame {
  width: 1.15rem;
  height: auto;
  filter: drop-shadow(0 1px 4px rgba(0, 0, 0, 0.35));
}

.journal-reveal__stage--panel {
  width: min(94vw, 30rem);
  gap: 1.5rem;
}

.journal-reveal__gift-frame {
  position: relative;
  width: min(72vw, 15.5rem);
  aspect-ratio: 3 / 4;
}

.journal-reveal__gift-frame .journal-reveal__gift,
.journal-reveal__gift-frame .journal-reveal__gift--idle {
  position: absolute;
  inset: 0;
  width: 100%;
  aspect-ratio: auto;
}

.journal-reveal__scene {
  position: absolute;
  inset: 0;
  transform-style: preserve-3d;
}

.journal-reveal__glow--strong {
  inset: -18%;
  background: radial-gradient(
    circle at 50% 45%,
    rgba(255, 220, 140, 0.62),
    transparent 64%
  );
}

.journal-reveal__subline {
  display: inline-flex;
  flex-direction: column;
  align-items: center;
  gap: 0.2rem;
}

.journal-reveal__chevron-nudge {
  display: block;
  font-size: 1.1rem;
  line-height: 1;
  color: rgba(232, 214, 180, 0.9);
  animation: jg-reveal-chevron-nudge 1.5s ease-in-out infinite;
}

@keyframes jg-reveal-chevron-nudge {
  0%,
  100% {
    transform: translateY(0);
    opacity: 0.65;
  }
  50% {
    transform: translateY(5px);
    opacity: 1;
  }
}

.journal-reveal__gift--nudge {
  animation: jg-reveal-gift-breathe 2.8s ease-in-out infinite;
}

@keyframes jg-reveal-gift-breathe {
  0%,
  100% {
    transform: scale(1);
  }
  50% {
    transform: scale(1.02);
  }
}

.journal-reveal__ribbon-h--tug {
  transform: scaleX(1.06) translateX(4px);
}

.journal-reveal__ribbon-handle {
  position: absolute;
  right: -6%;
  top: 40%;
  width: 28%;
  height: 22%;
  z-index: 6;
  border: none;
  padding: 0;
  cursor: grab;
  background: linear-gradient(
    90deg,
    transparent 0%,
    rgba(212, 175, 90, 0.15) 35%,
    rgba(212, 175, 90, 0.55) 100%
  );
  border-radius: 0.35rem;
  touch-action: none;
}

.journal-reveal__ribbon-handle:active {
  cursor: grabbing;
}

.journal-reveal__ribbon-handle--tap {
  cursor: pointer;
}

.journal-reveal__ribbon-handle:focus-visible {
  outline: 2px solid rgba(212, 175, 105, 0.95);
  outline-offset: 3px;
}

.journal-reveal__bow--untie,
.journal-reveal__gift--bow-untie .journal-reveal__bow {
  animation: jg-reveal-bow-untie 0.9s ease forwards;
}

.journal-reveal__ribbon--untie {
  animation: jg-reveal-ribbon-slide 0.9s ease forwards;
}

@keyframes jg-reveal-bow-untie {
  0% {
    transform: translate(-50%, -50%) scale(1) rotate(0deg);
    opacity: 1;
  }
  45% {
    transform: translate(-50%, -42%) scale(0.92) rotate(-10deg);
  }
  100% {
    transform: translate(-50%, -10%) scale(0.55) rotate(-18deg);
    opacity: 0;
  }
}

@keyframes jg-reveal-ribbon-slide {
  to {
    opacity: 0.35;
    filter: brightness(0.95);
  }
}

.journal-reveal__ribbon-loose {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 3;
}

.journal-reveal__ribbon-loose-band {
  position: absolute;
  left: -2%;
  right: -2%;
  top: 48%;
  height: 10%;
  border-radius: 0.2rem;
  background: linear-gradient(180deg, #e8c878, #b8903a 55%, #d4af5a);
  transform: rotate(-4deg);
  opacity: 0.92;
  box-shadow: 0 2px 8px rgba(40, 24, 4, 0.25);
}

.journal-reveal__ribbon-loose-tail {
  position: absolute;
  top: 52%;
  width: 14%;
  height: 34%;
  border-radius: 40% 40% 18% 18%;
  background: linear-gradient(180deg, #e0bc62, #b48a30);
}

.journal-reveal__ribbon-loose-tail--l {
  left: 22%;
  transform: rotate(28deg);
}

.journal-reveal__ribbon-loose-tail--r {
  right: 18%;
  transform: rotate(-34deg);
}

.journal-reveal__paper--corner-peel {
  clip-path: polygon(0 0, 100% 0, 100% 72%, 68% 100%, 0 100%);
  transform: rotate(-4deg) scale(1.02);
  transform-origin: 100% 0;
}

.journal-reveal__paper--peeling,
.journal-reveal__paper--open {
  clip-path: polygon(0 0, 18% 0, 8% 100%, 0 100%);
  transform: translateX(-18%) rotate(-16deg);
  opacity: 0.55;
  transform-origin: 0 50%;
}

.journal-reveal__scene--box-open-revealed .journal-reveal__paper--open {
  left: -8%;
  right: auto;
  width: 42%;
  opacity: 0.7;
}

.journal-reveal__gap-glow {
  position: absolute;
  inset: 0;
  background: radial-gradient(
    circle at 78% 18%,
    rgba(255, 220, 140, 0.55),
    transparent 42%
  );
  pointer-events: none;
  mix-blend-mode: screen;
}

.journal-reveal__gap-glow--edge {
  inset: auto;
  right: 8%;
  top: 10%;
  width: 35%;
  height: 35%;
  background: radial-gradient(
    circle,
    rgba(255, 220, 140, 0.5),
    transparent 70%
  );
}

.journal-reveal__journal--peek {
  inset: 16% 18% 18%;
  opacity: 0.85;
  filter: brightness(1.05);
}

.journal-reveal__journal--lifted {
  position: absolute;
  inset: 6% 10% 8%;
  z-index: 2;
}

.journal-reveal__scene--journal-lifted .journal-reveal__journal--lifted,
.journal-reveal__scene--journal-opening .journal-reveal__journal--lifted {
  box-shadow:
    0 22px 48px rgba(16, 10, 4, 0.55),
    0 0 40px rgba(255, 210, 120, 0.28);
}

.journal-reveal__dots {
  position: absolute;
  bottom: max(1.25rem, env(safe-area-inset-bottom));
  left: 50%;
  transform: translateX(-50%);
  z-index: 5;
  display: flex;
  align-items: center;
  gap: 0.65rem;
}

.journal-reveal__dot-list {
  display: flex;
  align-items: center;
  gap: 0.45rem;
  margin: 0;
  padding: 0;
  list-style: none;
}

.journal-reveal__dot {
  display: block;
  width: 0.45rem;
  height: 0.45rem;
  border-radius: 50%;
  background: rgba(232, 214, 180, 0.35);
  box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.15);
}

.journal-reveal__dot--active {
  background: #e8c878;
  box-shadow:
    0 0 0 1px rgba(184, 140, 55, 0.45),
    0 0 10px rgba(232, 200, 120, 0.55);
  transform: scale(1.15);
}

.journal-reveal__dot-chevron {
  border: none;
  background: transparent;
  color: rgba(247, 240, 228, 0.85);
  font-size: 1.45rem;
  line-height: 1;
  padding: 0.2rem 0.45rem;
  cursor: pointer;
  border-radius: 0.35rem;
}

.journal-reveal__dot-chevron:disabled {
  opacity: 0.28;
  cursor: default;
}

.journal-reveal__dot-chevron:not(:disabled):hover,
.journal-reveal__dot-chevron:not(:disabled):focus-visible {
  outline: 2px solid rgba(212, 175, 105, 0.85);
  outline-offset: 2px;
  color: #fff8ec;
}

.journal-reveal__gift--nudge-then-fade,
.journal-reveal__gift--fade {
  animation: jg-reveal-panel-fade 0.45s ease forwards;
}

.journal-reveal__gift--lift-out-of-box {
  animation: jg-reveal-lift 0.8s ease forwards;
}

.journal-reveal__gift--cover-open {
  animation: jg-reveal-panel-fade 0.85s ease forwards;
}

@keyframes jg-reveal-panel-fade {
  to {
    opacity: 0.35;
    transform: scale(0.98);
  }
}

@keyframes jg-reveal-lift {
  to {
    transform: translateY(-12%) scale(1.04);
    filter: brightness(1.08);
  }
}
