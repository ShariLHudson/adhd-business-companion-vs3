<!doctype html><html><head><meta charset="utf-8"/><title>Journal gift — bow</title>
<style>
body{margin:0;min-height:100vh;background:
  radial-gradient(ellipse 80% 60% at 50% 40%,rgba(90,70,45,.35),transparent 70%),
  linear-gradient(180deg,#3a2e22 0%,#1c1610 100%);
display:grid;place-items:center}
.journal-gift-scene{position:relative;min-height:100vh;width:100%}
.jg-cinematic-gift{perspective:1400px;transform-style:preserve-3d}
.jg-cinematic-gift__desk-shadow{position:absolute;left:-8%;right:-8%;bottom:-14%;height:30%;background:radial-gradient(ellipse,rgba(8,6,4,.45),transparent 70%)}
.jg-cinematic-gift__wrap{position:absolute;inset:-12% -3% -4%;transform-style:preserve-3d}
.jg-cinematic-gift__paper--front{position:absolute;inset:0;border-radius:10px;background-size:cover;background-position:center;box-shadow:0 18px 42px rgba(8,6,4,.38)}
.jg-cinematic-gift__journal{position:absolute;inset:0;display:flex;opacity:0}
.jg-cinematic-gift--journal-visible .jg-cinematic-gift__journal{opacity:1}
.jg-cinematic-gift__journal-cover{flex:1;border-radius:0 14px 14px 0;background:linear-gradient(145deg,#3f5f50,#1e3028)}
.jg-cinematic-gift__journal-spine{flex:0 0 13%;background:linear-gradient(90deg,#243830,#355248,#243830);border-radius:10px 0 0 10px}
.jg-cinematic-gift__package-photo{position:absolute;inset:-2%;width:104%;height:104%;object-fit:contain;z-index:6;filter:drop-shadow(0 22px 48px rgba(8,6,4,.42))}
.jg-cinematic-gift__ribbon{position:absolute;background:linear-gradient(90deg,#9a7840,#d4b870,#9a7840)}
.jg-cinematic-gift__ribbon--h{left:0;right:0;top:50%;height:12%;transform:translateY(-50%);z-index:2}
.jg-cinematic-gift__ribbon--v{top:0;bottom:0;left:50%;width:12%;transform:translateX(-50%);z-index:2}
.jg-cinematic-gift__bow{position:absolute;left:50%;top:50%;width:55%;aspect-ratio:1.2;transform:translate(-50%,-50%);z-index:5}
.jg-cover-emboss__title{position:absolute;top:17%;left:50%;transform:translate(-50%,-50%);color:#e8c878;font-family:Georgia,serif;font-size:1.2rem;text-align:center;width:88%}
/**
 * Physical journal gift on the Gazebo desk — no modal panels or card flips.
 */

.journal-gift-scene {
  position: absolute;
  inset: 0;
  z-index: 12;
  pointer-events: none;
  display: grid;
  place-items: center;
  isolation: isolate;
}

.journal-gift-scene__skip {
  position: absolute;
  top: max(1rem, env(safe-area-inset-top));
  right: max(1rem, env(safe-area-inset-right));
  z-index: 20;
  pointer-events: auto;
  border: 1px solid rgba(232, 214, 180, 0.4);
  background: rgba(28, 22, 16, 0.45);
  color: #f4ebe0;
  border-radius: 999px;
  padding: 0.5rem 0.95rem;
  font-size: 0.9rem;
  cursor: pointer;
  backdrop-filter: blur(6px);
}

.journal-gift-scene__skip:hover,
.journal-gift-scene__skip:focus-visible {
  outline: 2px solid rgba(212, 175, 105, 0.85);
  outline-offset: 2px;
}

.journal-gift-scene__stage {
  position: relative;
  width: min(58vw, 34rem);
  height: min(66vh, 40rem);
  max-width: 92vw;
  pointer-events: none;
  perspective: 1400px;
  transform-style: preserve-3d;
}

.journal-gift-scene__hit {
  position: absolute;
  inset: 0;
  border: none;
  padding: 0;
  margin: 0;
  background: transparent;
  cursor: pointer;
  pointer-events: auto;
  color: inherit;
}

.journal-gift-scene__hit:focus-visible {
  outline: 2px solid rgba(212, 175, 105, 0.9);
  outline-offset: 10px;
  border-radius: 1rem;
}

.journal-gift-scene__caption {
  position: absolute;
  left: 50%;
  bottom: max(1.5rem, env(safe-area-inset-bottom));
  transform: translateX(-50%);
  z-index: 16;
  pointer-events: none;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.3rem;
  text-align: center;
  text-shadow: 0 2px 16px rgba(0, 0, 0, 0.55);
}

.journal-gift-scene__caption strong {
  font-family: Georgia, "Times New Roman", serif;
  font-size: clamp(1.2rem, 2.6vw, 1.55rem);
  font-weight: 500;
  color: #fff8ec;
}

.journal-gift-scene__caption span {
  color: rgba(247, 240, 228, 0.88);
  font-size: 1rem;
}

.journal-gift-scene__sparkles {
  position: absolute;
  inset: 8% 12%;
  pointer-events: none;
  z-index: 8;
}

.journal-gift-scene__spark {
  position: absolute;
  width: 0.32rem;
  height: 0.32rem;
  border-radius: 50%;
  background: radial-gradient(circle, #ffe6a8, #d4a24a 60%, transparent);
}

/* Physical gift host — sits in the scene, not a floating card */
.journal-gift-scene .jg-cinematic-gift--physical,
.journal-gazebo--gift-unwrap .journal-gift-scene .jg-cinematic-gift--physical {
  position: absolute !important;
  left: 50% !important;
  top: 48% !important;
  right: auto !important;
  bottom: auto !important;
  transform: translate(-50%, -50%) rotate(-3deg) !important;
  width: min(22rem, 72vw) !important;
  height: auto !important;
  max-width: min(22rem, 72vw) !important;
  aspect-ratio: 4 / 5 !important;
  pointer-events: none;
  z-index: 14;
  filter: drop-shadow(0 28px 48px rgba(8, 6, 4, 0.5));
  overflow: visible;
}

.journal-gift-scene .jg-cinematic-gift__package-photo {
  z-index: 10;
  opacity: 1;
  object-fit: contain;
}

.journal-gift-scene .jg-cinematic-gift--ribbon-pull .jg-cinematic-gift__package-photo {
  opacity: 1;
  z-index: 10;
}

.journal-gift-scene .jg-cinematic-gift--bow .jg-cinematic-gift__package-photo {
  opacity: 0.2;
  transform: scale(1.03) translateY(-1%);
  z-index: 4;
  transition: opacity 0.9s ease, transform 1.1s cubic-bezier(0.22, 1, 0.36, 1);
}

.journal-gift-scene .jg-cinematic-gift--bow .jg-cinematic-gift__wrap,
.journal-gift-scene .jg-cinematic-gift--ribbon .jg-cinematic-gift__wrap,
.journal-gift-scene .jg-cinematic-gift--unwrap .jg-cinematic-gift__wrap {
  z-index: 8;
}

/* Keep ribbon bands in proportion to the package — not full-card overlays */
.journal-gift-scene .jg-cinematic-gift__ribbon--h {
  height: 9% !important;
  min-height: 0 !important;
}

.journal-gift-scene .jg-cinematic-gift__ribbon--v {
  width: 9% !important;
  min-width: 0 !important;
}

.journal-gift-scene .jg-cinematic-gift__bow {
  width: 48% !important;
  height: auto !important;
  aspect-ratio: 1.25;
}

.journal-gift-scene .jg-cinematic-gift--interactive {
  pointer-events: auto;
}

.journal-gift-scene .jg-cinematic-gift--admire,
.journal-gift-scene .jg-cinematic-gift--opening {
  transform: translate(-50%, -50%) rotate(-1deg) scale(1.04);
  transition: transform 1.1s cubic-bezier(0.22, 1, 0.36, 1);
}

.journal-gift-scene .jg-cinematic-gift__journal-cover {
  border: none;
  padding: 0;
  width: 100%;
  text-align: inherit;
  cursor: default;
  color: inherit;
  font: inherit;
}

.journal-gift-scene .jg-cinematic-gift__journal-cover--clickable {
  cursor: pointer;
}

.journal-gift-scene .jg-cinematic-gift__journal-cover--clickable:focus-visible {
  outline: 2px solid rgba(212, 175, 105, 0.95);
  outline-offset: 6px;
}

/* Ribbon drag handle — invisible hit target over the photo ribbon tail */
.jg-gift-ribbon-handle {
  position: absolute;
  right: 8%;
  top: 38%;
  width: 38%;
  height: 28%;
  z-index: 12;
  pointer-events: auto;
  border: none;
  padding: 0;
  cursor: grab;
  border-radius: 0.4rem;
  background: transparent;
  touch-action: none;
}

.jg-gift-ribbon-handle:active {
  cursor: grabbing;
}

.jg-gift-ribbon-handle--tap {
  cursor: pointer;
}

.jg-gift-ribbon-handle:focus-visible {
  outline: 2px solid rgba(212, 175, 105, 0.95);
  outline-offset: 3px;
}

/* Paper flaps — fold like paper */
.jg-cinematic-gift__flap {
  position: absolute;
  background-size: cover;
  background-position: center;
  pointer-events: none;
  transform-style: preserve-3d;
  box-shadow: 0 8px 20px rgba(8, 6, 4, 0.22);
  transition: transform 1.35s cubic-bezier(0.22, 1, 0.36, 1);
  z-index: 3;
  opacity: 0;
}

.jg-cinematic-gift--unwrap .jg-cinematic-gift__flap,
.jg-cinematic-gift--reveal .jg-cinematic-gift__flap {
  opacity: 1;
}

.jg-cinematic-gift__flap--top {
  left: 4%;
  right: 4%;
  top: 0;
  height: 42%;
  transform-origin: top center;
  border-radius: 8px 8px 2px 2px;
}

.jg-cinematic-gift__flap--bottom {
  left: 6%;
  right: 6%;
  bottom: 0;
  height: 28%;
  transform-origin: bottom center;
  border-radius: 2px 2px 8px 8px;
}

.jg-cinematic-gift__flap--left {
  left: 0;
  top: 8%;
  bottom: 8%;
  width: 38%;
  transform-origin: left center;
  border-radius: 8px 2px 2px 8px;
}

.jg-cinematic-gift__flap--right {
  right: 0;
  top: 8%;
  bottom: 8%;
  width: 38%;
  transform-origin: right center;
  border-radius: 2px 8px 8px 2px;
}

.jg-cinematic-gift--unwrap .jg-cinematic-gift__flap--top {
  transform: rotateX(-118deg) translateZ(6px);
}

.jg-cinematic-gift--unwrap .jg-cinematic-gift__flap--bottom {
  transform: rotateX(98deg) translateZ(4px);
}

.jg-cinematic-gift--unwrap .jg-cinematic-gift__flap--left {
  transform: rotateY(-108deg) translateZ(8px);
}

.jg-cinematic-gift--unwrap .jg-cinematic-gift__flap--right {
  transform: rotateY(108deg) translateZ(8px);
}

.jg-cinematic-gift--unwrap .jg-cinematic-gift__paper--front {
  transform: rotateY(-96deg) translateX(-8%) translateZ(10px) !important;
  opacity: 0.55 !important;
  transform-origin: left center;
}

.jg-cinematic-gift--reveal .jg-cinematic-gift__flap--top {
  transform: rotateX(-128deg) translateY(-8%) translateZ(10px);
}

.jg-cinematic-gift--reveal .jg-cinematic-gift__flap--right {
  transform: rotateY(122deg) translateX(10%) translateZ(12px);
}

.jg-cinematic-gift--reveal .jg-cinematic-gift__flap--left {
  transform: rotateY(-122deg) translateX(-10%) translateZ(12px);
}

.jg-cinematic-gift--reveal .jg-cinematic-gift__flap--bottom {
  transform: rotateX(110deg) translateY(6%) translateZ(8px);
}

/* Cover opens like a book — spine anchored */
.jg-cinematic-gift--opening .jg-cinematic-gift__journal {
  transform-style: preserve-3d;
}

.jg-cinematic-gift--opening .jg-cinematic-gift__journal-cover {
  transform-origin: left center;
  animation: jg-gift-cover-open 1.35s cubic-bezier(0.22, 0.8, 0.28, 1) forwards;
}

.jg-cinematic-gift--opening .jg-cinematic-gift__journal-page-edge {
  animation: jg-gift-pages-part 1.2s ease forwards;
}

@keyframes jg-gift-cover-open {
  0% {
    transform: rotateY(0deg);
  }
  100% {
    transform: rotateY(-72deg);
  }
}

@keyframes jg-gift-pages-part {
  0% {
    transform: translateX(0);
  }
  100% {
    transform: translateX(4px);
  }
}

.jg-cinematic-gift--reveal .jg-cinematic-gift__journal,
.jg-cinematic-gift--admire .jg-cinematic-gift__journal,
.jg-cinematic-gift--opening .jg-cinematic-gift__journal {
  opacity: 1 !important;
  transform: scale(1) translateY(-4%) !important;
  pointer-events: auto !important;
  filter: drop-shadow(0 0 28px rgba(255, 210, 120, 0.28));
}

.journal-gift-scene .sr-only {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  margin: -1px;
  overflow: hidden;
  clip: rect(0, 0, 0, 0);
  white-space: nowrap;
  border: 0;
}

/* Soften estate gift host — desk photo stays the hero */
.journal-estate--gift {
  background: transparent !important;
  pointer-events: none;
}

.journal-estate--gift .journal-gift-scene {
  pointer-events: none;
}

.journal-gazebo--gift-unwrap .jg-open-book__focus-veil--gift {
  background:
    radial-gradient(
      ellipse 70% 55% at 50% 48%,
      rgba(20, 14, 8, 0.08),
      transparent 70%
    );
  opacity: 0.55;
}

.journal-gazebo--gift-unwrap .journal-gazebo__background,
.journal-gazebo--gift-unwrap.journal-gazebo--book-focus .journal-gazebo__background {
  filter: brightness(0.92) saturate(1) blur(1.5px) !important;
  transform: none !important;
}

@media (prefers-reduced-motion: reduce) {
  .journal-gift-scene__sparkles,
  .jg-cinematic-gift__flap,
  .jg-cinematic-gift--opening .jg-cinematic-gift__journal-cover {
    animation: none !important;
    transition: none !important;
  }
}

</style></head><body><div class="journal-gift-scene" data-testid="journal-reveal-flow" data-reveal-state="bow" data-first-creation="true" role="region" aria-labelledby="_r_0_"><h2 id="_r_0_" class="sr-only">Spark has prepared a journal especially for you — My Journey</h2><button type="button" class="journal-gift-scene__skip" data-testid="journal-reveal-skip">Skip reveal</button><div class="journal-gift-scene__stage"><div class="jg-cinematic-gift jg-cinematic-gift--journal-shape jg-cinematic-gift--physical jg-cinematic-gift--bow jg-cinematic-gift--unwrap-active jg-cinematic-gift--bow-loose" style="--jg-gift-wrap-paper: url(/images/spark-wrapping-paper.png);" data-leather="forest" data-gift-moment="bow" data-testid="journal-physical-gift"><span class="jg-cinematic-gift__desk-shadow" aria-hidden="true"></span><img alt="" class="jg-cinematic-gift__package-photo jg-cinematic-gift__package-photo--unwrapping" draggable="false" src="/public/images/gift-wrapped-journal.png"><div class="jg-cinematic-gift__journal" data-testid="journal-reveal-cover" data-leather="forest"><span class="jg-cinematic-gift__journal-shadow" aria-hidden="true"></span><span class="jg-cinematic-gift__journal-spine" aria-hidden="true"></span><div class="jg-cinematic-gift__journal-cover"><span class="jg-cinematic-gift__leather-texture"></span><div class="jg-cover-emboss jg-cover-emboss--gift" aria-hidden="true"><p class="jg-cover-emboss__title">My Journey</p></div><span class="jg-cinematic-gift__cover-flame jg-estate-flame" aria-hidden="true"></span></div></div><div class="jg-cinematic-gift__wrap" aria-hidden="true"><span class="jg-cinematic-gift__paper jg-cinematic-gift__paper--front" style="background-image: url(&quot;/images/spark-wrapping-paper.png&quot;);"><span class="jg-cinematic-gift__paper-sheen"></span></span><span class="jg-cinematic-gift__flap jg-cinematic-gift__flap--top" style="background-image: url(&quot;/images/spark-wrapping-paper.png&quot;);"></span><span class="jg-cinematic-gift__flap jg-cinematic-gift__flap--right" style="background-image: url(&quot;/images/spark-wrapping-paper.png&quot;);"></span><span class="jg-cinematic-gift__flap jg-cinematic-gift__flap--left" style="background-image: url(&quot;/images/spark-wrapping-paper.png&quot;);"></span><span class="jg-cinematic-gift__flap jg-cinematic-gift__flap--bottom" style="background-image: url(&quot;/images/spark-wrapping-paper.png&quot;);"></span><span class="jg-cinematic-gift__ribbon jg-cinematic-gift__ribbon--h"></span><span class="jg-cinematic-gift__ribbon jg-cinematic-gift__ribbon--v"></span><span class="jg-cinematic-gift__ribbon-tail jg-cinematic-gift__ribbon-tail--right"></span><span class="jg-cinematic-gift__bow"><span class="jg-cinematic-gift__bow-loop jg-cinematic-gift__bow-loop--tl"></span><span class="jg-cinematic-gift__bow-loop jg-cinematic-gift__bow-loop--tr"></span><span class="jg-cinematic-gift__bow-loop jg-cinematic-gift__bow-loop--bl"></span><span class="jg-cinematic-gift__bow-loop jg-cinematic-gift__bow-loop--br"></span><span class="jg-cinematic-gift__bow-knot"></span><span class="jg-cinematic-gift__bow-tail jg-cinematic-gift__bow-tail--left"></span><span class="jg-cinematic-gift__bow-tail jg-cinematic-gift__bow-tail--right"></span><span class="jg-cinematic-gift__wax-seal"><span class="jg-cinematic-gift__wax-flame jg-estate-flame"></span></span></span><span class="jg-cinematic-gift__gift-tag"><span class="jg-cinematic-gift__gift-tag-flame jg-estate-flame"></span><span class="jg-cinematic-gift__gift-tag-label">For You</span></span></div></div></div><div class="journal-gift-scene__caption" role="status" style="opacity: 0; transform: translateY(8px);"><strong>Your journal is ready</strong><span>Open your gift</span></div></div></body></html>
