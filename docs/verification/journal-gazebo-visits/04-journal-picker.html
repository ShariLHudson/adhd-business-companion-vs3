<!doctype html><html><head><meta charset="utf-8"/><title>Journal picker</title>
<style>
body{margin:0;min-height:100vh;background:#2a2218;color:#f4efe6;font-family:Georgia,serif;padding:24px}
.jg-table-actions{display:flex;gap:16px;flex-wrap:wrap;margin-top:24px}
.jg-table-actions__plaque{background:#1e4f4f;color:#fff;border:0;border-radius:12px;padding:16px 20px;min-width:200px;text-align:left;cursor:pointer}
.jg-table-actions__plaque-title{display:block;font-size:1.15rem}
.jg-table-actions__plaque-sub{display:block;opacity:.85;margin-top:4px;font-size:.9rem}
.jg-journal-picker__panel{background:#1f1a14;padding:24px;border-radius:16px}
</style></head><body><h1>Journal picker</h1><div class="jg-journal-picker" role="dialog" aria-labelledby="jg-journal-picker-title"><button type="button" class="jg-journal-picker__backdrop" aria-label="Close journal list"></button><div class="jg-journal-picker__panel"><h2 id="jg-journal-picker-title" class="jg-journal-picker__title">Choose a journal:</h2><p class="jg-journal-picker__subtitle">Pick up where you left off.</p><ul class="jg-journal-picker__grid"><li><button type="button" class="jg-journal-picker__item" data-leather="forest"><span class="jg-journal-picker__cover" aria-hidden="true"></span><span class="jg-journal-picker__meta"><span class="jg-journal-picker__name">Business Journal</span></span></button></li><li><button type="button" class="jg-journal-picker__item" data-leather="forest"><span class="jg-journal-picker__cover" aria-hidden="true"></span><span class="jg-journal-picker__meta"><span class="jg-journal-picker__name">Ideas Journal</span></span></button></li><li><button type="button" class="jg-journal-picker__item" data-leather="forest"><span class="jg-journal-picker__cover" aria-hidden="true"></span><span class="jg-journal-picker__meta"><span class="jg-journal-picker__name">Reflection Journal</span></span></button></li></ul><button type="button" class="jg-journal-picker__close">Stay here</button></div></div></body></html>
