<!doctype html><html><head><meta charset="utf-8"/><title>Note variation</title>
<style>
body{margin:0;min-height:100vh;background:#2a2218;color:#f4efe6;font-family:Georgia,serif;padding:24px;position:relative}
.jg-welcome-desk-root,.jg-sanctuary-desk{position:relative;min-height:70vh;background:radial-gradient(ellipse at 50% 70%,#4a5a3a 0%,#2a2218 70%)}
.jg-welcome-desk__letter-slot{position:absolute;left:50%;top:42%;transform:translate(-50%,-42%);width:min(22rem,48vw)}
.jg-welcome-note,.jg-cinematic-letter{background:#f7f0e4;color:#2a2218;padding:24px;border-radius:4px;box-shadow:0 16px 40px rgba(0,0,0,.35)}
.jg-return-note{position:absolute;left:58%;bottom:40%;transform:translateX(-50%) rotate(-3.5deg);width:14rem;padding:1rem;background:linear-gradient(165deg,#fdf9f0,#e8dbc4);color:#3d3428;border:1px solid rgba(155,125,78,.42);box-shadow:0 10px 22px rgba(0,0,0,.32)}
.jg-return-note__sign{text-align:right;font-family:cursive;margin-top:.75rem}
.jg-table-actions{display:flex;gap:16px;flex-wrap:wrap;margin-top:24px}
.jg-table-actions__plaque{background:#1e4f4f;color:#fff;border:0;border-radius:12px;padding:16px 20px;min-width:200px;text-align:left;cursor:pointer}
.jg-table-actions__plaque-title{display:block;font-size:1.15rem}
.jg-table-actions__plaque-sub{display:block;opacity:.85;margin-top:4px;font-size:.9rem}
.jg-table-actions__menu{list-style:none;padding:8px;margin:8px 0 0;background:#1a1714;border-radius:10px}
.jg-table-actions__menu-item{display:block;width:100%;text-align:left;padding:10px 12px;border:0;background:transparent;color:#f4efe6;cursor:pointer}
.jg-journal-picker__panel{background:#1f1a14;padding:24px;border-radius:16px}
.jg-journal-picker__grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;list-style:none;padding:0}
.jg-journal-picker__item{background:#3b2416;color:#f0d48a;border:0;border-radius:10px;padding:16px;width:100%;cursor:pointer}

(47, 74, 62) 48%, rgb(26, 46, 38) 100%);" aria-label="Business Journal cover" aria-expanded="false"><span class="journal-hero__cover-bevel" aria-hidden="true"></span><div class="journal-hero__cover-texture" aria-hidden="true"></div><p class="journal-hero__emboss">Business Journal</p><span class="journal-hero__flame" aria-hidden="true"></span></div></div></div></div></div></div><div class="jg-table-actions-portal"><div class="jg-sanctuary-desk--actions-only"><div class="jg-table-actions jg-table-actions--sanctuary" data-testid="jg-table-actions" data-actions-mode="returning"><button type="button" class="jg-table-actions__plaque jg-table-actions__plaque--create" data-testid="jg-create-new-journal"><span class="jg-table-actions__plaque-title">Create New Journal</span><span class="jg-table-actions__plaque-sub">Begin a journal that's uniquely yours.</span></button><div class="jg-table-actions__open-wrap"><button type="button" class="jg-table-actions__plaque jg-table-actions__plaque--open" data-testid="jg-write-journal"><span class="jg-table-actions__plaque-title">Write</span><span class="jg-table-actions__plaque-sub">Continue where you left off.</span><svg class="jg-table-actions__quill" viewBox="0 0 24 32" aria-hidden="true" focusable="false"><path fill="currentColor" d="M20.2 2.4c-.8 1.6-2.1 3.4-3.8 5.1-1.4 1.4-3 2.6-4.6 3.5l-.4.2.2.4c1.8 3.4 2.4 6.8 1.8 10.1-.3 1.6-1 3.1-2 4.4l-.3.4-.5-.3c-1.2-.7-2.1-1.7-2.7-2.9-.5-1-.7-2.1-.6-3.2.1-1.4.7-2.8 1.6-3.9.8-1 1.9-1.8 3.1-2.3 2.6-1.1 5.5-1.3 8.4-.7l.5.1.3-.5c.9-1.5 1.4-3 1.5-4.5.1-1.2-.1-2.2-.6-3.1L21 1.2l-.8 1.2zM8.4 16.8c-.5.8-.8 1.7-.9 2.6-.1.8 0 1.5.3 2.1.4.8 1.1 1.5 2 1.9l.2.1c.4-1 .6-2 .7-3 .4-2.4 0-4.9-1.2-7.3l-.1-.2c-1 .5-1.9 1.2-2.6 2-.7.8-1.2 1.7-1.4 2.7z"></path><path fill="currentColor" opacity="0.55" d="M3.5 28.8c2.2-1.2 4.5-2.8 6.6-4.8 1.2-1.1 2.2-2.4 3-3.8l.2-.4-1.1-.6c-1.5 2.2-3.4 4.1-5.6 5.6-1.4.9-2.9 1.6-4.4 2.1l1.3 1.9z"></path></svg></button></div></div></div></div></body></html>
