<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Evidence Vault Entrance — Verification Frames</title>
    <style>
      :root {
        --art-w: 1535;
        --art-h: 1024;
        --seam: 745;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        background: #120e0b;
        color: #f2e6d2;
        font-family: Georgia, "Times New Roman", serif;
      }
      h1 {
        margin: 1rem 1.25rem 0.5rem;
        font-size: 1.25rem;
        font-weight: 600;
      }
      .frames {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
        padding: 1rem;
      }
      .frame {
        position: relative;
        aspect-ratio: 1535 / 1024;
        overflow: hidden;
        background: #1a1410;
        border: 1px solid rgba(201, 166, 107, 0.35);
      }
      .frame label {
        position: absolute;
        left: 0.75rem;
        top: 0.6rem;
        z-index: 20;
        padding: 0.2rem 0.5rem;
        background: rgba(0, 0, 0, 0.55);
        font-size: 0.75rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      .stage {
        position: absolute;
        inset: 0;
        perspective: 1600px;
        transform-style: preserve-3d;
      }
      .plate {
        position: absolute;
        inset: 0;
      }
      .plate img {
        width: 100%;
        height: 100%;
        object-fit: fill;
        display: block;
      }
      .interior {
        clip-path: inset(19.5% 30% 11.1% 25.4%);
      }
      .door {
        position: absolute;
        top: calc(200 / 1024 * 100%);
        height: calc(710 / 1024 * 100%);
        transform-style: preserve-3d;
      }
      .door img {
        width: 100%;
        height: 100%;
        object-fit: fill;
        display: block;
      }
      .door-left {
        left: calc(390 / 1535 * 100%);
        width: calc(355 / 1535 * 100%);
        transform-origin: left center;
      }
      .door-right {
        left: calc(745 / 1535 * 100%);
        width: calc(330 / 1535 * 100%);
        transform-origin: right center;
      }
      .key {
        position: absolute;
        width: 3.2%;
        left: 68%;
        top: 42%;
        filter: drop-shadow(0 4px 10px rgba(0, 0, 0, 0.5));
      }
      .key-glow {
        position: absolute;
        left: 48.5%;
        top: 52%;
        width: 4%;
        aspect-ratio: 1;
        margin: -2% 0 0 -2%;
        border-radius: 50%;
        background: radial-gradient(
          circle,
          rgba(255, 220, 150, 0.55),
          transparent 70%
        );
      }
      .flash {
        position: absolute;
        left: 48.5%;
        top: 52%;
        width: 8%;
        aspect-ratio: 1;
        margin: -4% 0 0 -4%;
        border-radius: 50%;
        background: radial-gradient(
          circle,
          rgba(255, 245, 200, 0.9),
          transparent 70%
        );
      }
      /* State variants */
      #closed .door-left,
      #closed .door-right {
        transform: rotateY(0deg);
      }
      #unlocking .door-left,
      #unlocking .door-right {
        transform: rotateY(0deg);
      }
      #unlocking .key {
        left: 47.2%;
        top: 44%;
        transform: rotate(90deg) scale(0.85);
      }
      #opening .door-left {
        transform: perspective(1600px) rotateY(-55deg);
      }
      #opening .door-right {
        transform: perspective(1600px) rotateY(55deg);
      }
      #opening .key {
        display: none;
      }
      #open .door-left {
        transform: perspective(1600px) rotateY(-100deg);
      }
      #open .door-right {
        transform: perspective(1600px) rotateY(100deg);
      }
      #open .key,
      #open .key-glow,
      #open .flash {
        display: none;
      }
      #closed .flash,
      #opening .flash,
      #open .flash {
        display: none;
      }
    </style>
  </head>
  <body>
    <h1>Evidence Vault — physical door opening (verification)</h1>
    <div class="frames">
      <section class="frame" id="closed" data-frame="closed">
        <label>1 · Closed vault</label>
        <div class="stage">
          <div class="plate">
            <img src="./assets/evidence-vault-room-static.png" alt="" />
          </div>
          <div class="plate interior">
            <img src="./assets/evidence-vault-interior-reveal.png" alt="" />
          </div>
          <div class="door door-left">
            <img src="./assets/evidence-vault-door-left.png" alt="" />
          </div>
          <div class="door door-right">
            <img src="./assets/evidence-vault-door-right.png" alt="" />
          </div>
          <div class="key-glow"></div>
          <img class="key" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 160'%3E%3Cellipse cx='32' cy='28' rx='18' ry='22' fill='none' stroke='%23c9a46b' stroke-width='5'/%3E%3Crect x='27' y='48' width='10' height='78' rx='3' fill='%23c9a46b'/%3E%3Crect x='37' y='100' width='14' height='8' fill='%23c9a46b'/%3E%3Crect x='37' y='116' width='18' height='8' fill='%23c9a46b'/%3E%3C/svg%3E" alt="" />
        </div>
      </section>

      <section class="frame" id="unlocking" data-frame="unlocking">
        <label>2 · Unlocking</label>
        <div class="stage">
          <div class="plate">
            <img src="./assets/evidence-vault-room-static.png" alt="" />
          </div>
          <div class="plate interior">
            <img src="./assets/evidence-vault-interior-reveal.png" alt="" />
          </div>
          <div class="door door-left">
            <img src="./assets/evidence-vault-door-left.png" alt="" />
          </div>
          <div class="door door-right">
            <img src="./assets/evidence-vault-door-right.png" alt="" />
          </div>
          <div class="key-glow"></div>
          <div class="flash"></div>
          <img class="key" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 160'%3E%3Cellipse cx='32' cy='28' rx='18' ry='22' fill='none' stroke='%23c9a46b' stroke-width='5'/%3E%3Crect x='27' y='48' width='10' height='78' rx='3' fill='%23c9a46b'/%3E%3Crect x='37' y='100' width='14' height='8' fill='%23c9a46b'/%3E%3Crect x='37' y='116' width='18' height='8' fill='%23c9a46b'/%3E%3C/svg%3E" alt="" />
        </div>
      </section>

      <section class="frame" id="opening" data-frame="opening">
        <label>3 · Doors opening</label>
        <div class="stage">
          <div class="plate">
            <img src="./assets/evidence-vault-room-static.png" alt="" />
          </div>
          <div class="plate interior">
            <img src="./assets/evidence-vault-interior-reveal.png" alt="" />
          </div>
          <div class="door door-left">
            <img src="./assets/evidence-vault-door-left.png" alt="" />
          </div>
          <div class="door door-right">
            <img src="./assets/evidence-vault-door-right.png" alt="" />
          </div>
        </div>
      </section>

      <section class="frame" id="open" data-frame="open">
        <label>4 · Fully revealed</label>
        <div class="stage">
          <div class="plate">
            <img src="./assets/evidence-vault-room-static.png" alt="" />
          </div>
          <div class="plate interior">
            <img src="./assets/evidence-vault-interior-reveal.png" alt="" />
          </div>
          <div class="door door-left">
            <img src="./assets/evidence-vault-door-left.png" alt="" />
          </div>
          <div class="door door-right">
            <img src="./assets/evidence-vault-door-right.png" alt="" />
          </div>
        </div>
      </section>
    </div>
  </body>
</html>
